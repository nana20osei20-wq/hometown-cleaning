<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Doors & Installations</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

/* HERO SECTION */
.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
              url("door1.jpg") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
}

.hero h1 {
  font-size: 50px;
}

.hero p {
  margin: 15px 0;
  font-size: 18px;
}

.btn {
  background: #25D366;
  color: white;
  padding: 12px 25px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
}

/* GALLERY */
.gallery {
  padding: 60px 20px;
  text-align: center;
  background: #111;
  color: white;
}

.gallery h2 {
  margin-bottom: 30px;
  font-size: 30px;
}

.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
}

.card img {
  width: 100%;
  height: 350px;
  object-fit: cover;
  transition: 0.4s;
}

.card:hover img {
  transform: scale(1.1);
}

.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  padding: 10px;
  font-weight: bold;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}

/* FOOTER */
footer {
  background: #000;
  color: #aaa;
  text-align: center;
  padding: 20px;
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Premium Security Doors</h1>
    <p>Strong • Stylish • Reliable</p>
    <a href="https://wa.me/233XXXXXXXXX" class="btn">Chat on WhatsApp</a>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <h2>Our Work</h2>

  <div class="gallery-container">
    <div class="card">
      <img src="door1.jpg" alt="">
      <div class="overlay">Modern Security Door</div>
    </div>

    <div class="card">
      <img src="door2.jpg" alt="">
      <div class="overlay">Classic Steel Door</div>
    </div>

    <div class="card">
      <img src="window.jpg" alt="">
      <div class="overlay">Window Protection</div>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Premium Doors Ghana. All rights reserved.</p>
</footer>

</body>
</html>

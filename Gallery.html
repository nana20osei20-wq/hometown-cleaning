<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Work Gallery — Hometown Co Cleaning Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue: #1565C0;
      --blue-dark: #0d3a7a;
      --blue-light: #e8f0fe;
      --green: #2e7d32;
      --gold: #f5a623;
      --white: #ffffff;
      --off-white: #f8f9ff;
      --dark: #1a1a2e;
      --gray: #666;
    }
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  color: var(--dark);
  background: var(--white);
}

/* HEADER */
header {
  background: var(--blue);
  color: white;
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
}
nav { display: flex; gap: 24px; }
nav a {
  color: white;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 500;
  opacity: 0.9;
}
nav a:hover { opacity: 1; text-decoration: underline; }

/* HERO */
.gallery-hero {
  background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, #1976d2 100%);
  color: white;
  padding: 80px 32px;
  text-align: center;
}
.gallery-hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  margin-bottom: 16px;
}
.gallery-hero p {
  font-size: 1.15rem;
  opacity: 0.9;
  max-width: 600px;
  margin: 0 auto;
  line-height: 1.7;
}

/* STATS BAR */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  background: var(--dark);
  color: white;
}
.stat {
  padding: 30px 24px;
  text-align: center;
  border-right: 1px solid rgba(255,255,255,0.1);
}
.stat:last-child { border-right: none; }
.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 2.5rem;
  color: var(--gold);
  display: block;
  font-weight: 900;
}
.stat-label {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* GALLERY SECTION */
.gallery-section {
  padding: 80px 32px;
  max-width: 1200px;
  margin: 0 auto;
}
.gallery-section h3 {
  font-family: 'Playfair Display', serif;
  font-size: 2.2rem;
  text-align: center;
  margin-bottom: 12px;
  color: var(--dark);
}
.gallery-subtitle {
  text-align: center;
  color: var(--gray);
  margin-bottom: 50px;
  font-size: 1rem;
}

/* GALLERY GRID */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.gallery-item {
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  position: relative;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  aspect-ratio: 4/3;
}
.gallery-item:first-child {
  grid-column: span 2;
  aspect-ratio: 16/9;
}
.gallery-item:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}
.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
}
.gallery-item:hover img {
  transform: scale(1.05);
}
.gallery-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  color: white;
  padding: 20px 16px 16px;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.gallery-item:hover .gallery-overlay {
  opacity: 1;
}
.gallery-overlay h4 {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 4px;
}
.gallery-overlay p {
  font-size: 0.82rem;
  opacity: 0.85;
}
.gallery-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
}
.badge-blue { background: var(--blue); color: white; }
.badge-green { background: var(--green); color: white; }
.badge-gold { background: var(--gold); color: var(--dark); }

/* LIGHTBOX */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;

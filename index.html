<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hometown Co Cleaning Services</title>
  <meta name="description" content="Hometown Co Cleaning Services - Professional house and office cleaning in Kasoa and Accra, Ghana. Call 0208828635 for a free quote!">
  <meta name="keywords" content="cleaning service Kasoa, cleaning service Accra, house cleaning Ghana, office cleaning Accra">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; color: #333; }
/* HEADER */
header {
  background: #1565C0;
  color: white;
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
}
header h1 { font-size: 1.4rem; font-weight: 700; }
nav { display: flex; gap: 20px; flex-wrap: wrap; }
nav a { color: white; text-decoration: none; font-size: 0.95rem; }
nav a:hover { text-decoration: underline; }

/* HERO */
.hero {
  padding: 60px 24px;
  background: #f0f4ff;
  text-align: left;
  max-width: 800px;
  margin: 0 auto;
}
.hero h2 { font-size: 2.2rem; color: #1a1a2e; margin-bottom: 12px; }
.hero p { color: #555; font-size: 1.05rem; margin-bottom: 28px; }
.btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
.btn {
  padding: 12px 24px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  display: inline-block;
}
.btn-primary { background: #1565C0; color: white; }
.btn-success { background: #2e7d32; color: white; }
.btn-outline { background: white; color: #1565C0; border: 2px solid #1565C0; }

/* HERO IMAGE */
.hero-image {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  display: block;
}

/* WHY CHOOSE US */
.why-section {
  padding: 60px 24px;
  background: #f8f9ff;
  text-align: center;
}
.why-section h2 {
  font-size: 2rem;
  color: #1a1a2e;
  margin-bottom: 8px;
  font-weight: 700;
}
.why-subtitle {
  color: #666;
  margin-bottom: 40px;
  font-size: 1rem;
}
.accordion {
  max-width: 700px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.accordion-item {
  background: white;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  overflow: hidden;
  cursor: pointer;
}
.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 24px;
  gap: 16px;
}
.accordion-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.accordion-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.4rem;
  flex-shrink: 0;
}
.icon-blue { background: #e8f0fe; }
.icon-green { background: #e6f4ea; }
.icon-orange { background: #fff3e0; }
.accordion-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: #1a1a2e;
  text-align: left;
}
.accordion-badge {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-top: 4px;
  display: inline-block;
}
.badge-blue { background: #e8f0fe; color: #1967d2; }
.badge-green { background: #e6f4ea; color: #137333; }
.badge-orange { background: #fff3e0; color: #e65100; }
.accordion-arrow {
  font-size: 1.2rem;
  color: #999;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.accordion-item.active .accordion-arrow {
  transform: rotate(180deg);
  color: #1967d2;
}
.accordion-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.accordion-item.active .accordion-body {
  max-height: 600px;
}
.accordion-content {
  padding: 20px 24px 24px;
  border-top: 1px solid #f0f0f0;
  text-align: left;
}
.accordion-content p {
  color: #555;
  font-size: 0.95rem;
  line-height: 1.7;
  margin-bottom: 16px;
}
.feature-list {
  list-style: none;
  padding: 0;
  margin: 0 0 16px 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.feature-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.88rem;
  color: #444;
  background: #f8f9ff;
  padding: 8px 12px;
  border-radius: 8px;
}
.
